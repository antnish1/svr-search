<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TA DA Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>TA DA</h2>

    <ul>
      <li onclick="showSection('search')">🔍 Search</li>
      <li onclick="showSection('new')">➕ New List</li>
      <li onclick="showSection('reports')">📊 Reports</li>
      <li onclick="logout()">🚪 Logout</li>
    </ul>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <!-- TOP BAR -->
    <div class="topbar">
      <input type="text" placeholder="Search..." />
      <span id="usernameDisplay"></span>
    </div>

    <!-- CONTENT AREA -->
    <div class="content">

      <div id="search" class="section active">
        <h2>Search</h2>
        <p>Search your TA/DA records here...</p>
      </div>

      <div id="new" class="section">
        <h2>New List</h2>
        <p>Create a new TA/DA entry...</p>
      </div>

      <div id="reports" class="section">
        <h2>Reports</h2>
        <p>View your reports here...</p>
      </div>

    </div>

  </div>

</div>

<script src="dashboard.js"></script>
</body>
</html>
